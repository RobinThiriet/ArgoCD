apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml
  - saml-configmap.yaml
  - postgresql-service.yaml
  - postgresql-statefulset.yaml
  - guacd-service.yaml
  - guacd-deployment.yaml
  - guacamole-service.yaml
  - guacamole-deployment.yaml
  - ingress.yaml

configMapGenerator:
  - name: guacamole-postgresql-initdb
    files:
      - postgresql/initdb.sql

generatorOptions:
  disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/part-of: guacamole-bastion
