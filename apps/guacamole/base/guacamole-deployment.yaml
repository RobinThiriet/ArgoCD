apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: guacamole
          image: guacamole/guacamole:1.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: WEBAPP_CONTEXT
              value: ROOT
            - name: POSTGRESQL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: POSTGRESQL_ENABLED
            - name: GUACD_HOSTNAME
              value: guacamole-guacd
            - name: GUACD_PORT
              value: "4822"
            - name: POSTGRESQL_HOSTNAME
              value: guacamole-postgresql
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: guacamole-secrets
                  key: POSTGRES_DB
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: guacamole-secrets
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guacamole-secrets
                  key: POSTGRES_PASSWORD
            - name: SAML_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_ENABLED
            - name: SAML_IDP_METADATA_URL
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_IDP_METADATA_URL
            - name: SAML_ENTITY_ID
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_ENTITY_ID
            - name: SAML_CALLBACK_URL
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_CALLBACK_URL
            - name: SAML_STRICT
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_STRICT
            - name: SAML_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_DEBUG
            - name: SAML_COMPRESS_REQUEST
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_COMPRESS_REQUEST
            - name: SAML_COMPRESS_RESPONSE
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_COMPRESS_RESPONSE
            - name: SAML_GROUP_ATTRIBUTE
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: SAML_GROUP_ATTRIBUTE
            - name: EXTENSION_PRIORITY
              valueFrom:
                configMapKeyRef:
                  name: guacamole-saml-config
                  key: EXTENSION_PRIORITY
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
